name: Test

on:
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          cache-dependency-path: 'package.json'
          cache: 'yarn'
          node-version: "20"

      - name: dependencies
        run: yarn

      - name: lint
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          cache-dependency-path: 'package.json'
          cache: 'yarn'
          node-version: ${{ matrix.node }}

      - name: dependencies
        run: yarn

      - name: test
        run: yarn test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          cache-dependency-path: 'package.json'
          cache: 'yarn'
          node-version: "20"

      - name: dependencies
        run: yarn

      - name: build
        run: yarn build
